  - id: AC15
    description: >
      Comprehensive cargo tests exist for the skill subsystem covering:
      list output, list --json, info output, info --json, info nonexistent,
      error handling (malformed manifest, missing manifest), empty skills dir,
      and multi-scope discovery.
    verification: |
      cargo test --test gateway_cli_smoke -- skill
      # Assert: 8+ new skill-related tests pass
    status: NOT-IMPLEMENTED  # No skill tests exist in gateway_cli_smoke.rs

ontology:
  name: LuxSkillManifest
  description: >
    Schema for Lux skill package metadata, combining UPM manifest
    patterns with SKILL.md documentation format. Skills are pure
    metadata/documentation bundles that instruct AI agents — they do
    not contain executable code or affect CLI command dispatch.
  fields:
    - name: name
      type: string
      description: "Simple skill identifier (e.g. lux-unity)"
      required: true
    - name: version
      type: string
      description: "Semver version string (e.g. 1.0.0)"
      required: true
    - name: description
      type: string
      description: "Short human-readable description of the skill"
      required: true
    - name: displayName
      type: string
      description: "Human-friendly display name (e.g. Lux Unity)"
      required: false
    - name: luxVersion
      type: string
      description: "Semver range for Lux CLI compatibility (e.g. >=0.1.0). Defined only, not enforced in Phase 1."
      required: false
    - name: author
      type: object
      description: "Author info: { name: string, email?: string, url?: string }"
      required: false
    - name: keywords
      type: array
      description: "String array of searchable categorization tags"
      required: false
    - name: type
      type: string
      description: "Skill scope: core | project | global"
      required: true
    - name: source
      type: string
      description: "Installation source URL. Null for core skills."
      required: false
    - name: dependencies
      type: object
      description: "Dependency map. Always empty object {} in Phase 1."
      required: false

evaluation_principles:
  - name: cli_correctness
    description: >
      All CLI commands produce exact expected output format, content,
      and exit codes as specified in acceptance criteria.
    weight: 0.35

  - name: backward_compatibility
    description: >
      All 32 existing cargo tests pass. No existing command behavior
      changes. No modifications to existing test files.
    weight: 0.25

  - name: error_resilience
    description: >
      Graceful handling of malformed manifests, missing files, empty
      directories, and nonexistent skill names. Warn on stderr and
      skip, never crash for recoverable errors.
    weight: 0.20

  - name: cross_platform
    description: >
      Path handling, directory scanning, and home directory resolution
      work correctly on Windows, macOS, and Linux.
    weight: 0.10

  - name: code_quality
    description: >
      New code follows existing patterns: serde derive for JSON, clap
      derive for CLI, anyhow for error propagation, eprintln for
      warnings. Minimal diff — no unnecessary refactoring.
    weight: 0.10

exit_conditions:
  - name: all_ac_pass
    description: All 15 acceptance criteria verified as passing
    criteria: Each AC1 through AC15 individually confirmed with expected exit codes and output

  - name: cargo_test_green
    description: Full test suite passes including new skill tests
    criteria: "cargo test in RustGateway~/ returns exit code 0 with 32+ existing tests + new skill tests passing"

  - name: compilation_clean
    description: Rust code compiles without errors or warnings
    criteria: "cargo build returns exit code 0; cargo clippy produces 0 warnings on new code"

