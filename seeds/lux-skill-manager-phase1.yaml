goal: |
  Complete and test Phase 1 of the Lux Internal Skill Manager. The core
  infrastructure already exists: manifest.json schema, Skills/lux-unity/
  directory with manifest.json + SKILL.md + 9 references, and `lux skill
  list` / `lux skill info <name>` CLI commands with single-scope (core)
  discovery. Phase 1 must: (1) extend discover_skills() to scan project
  (.lux/skills/) and global (~/.lux/skills/) directories in addition to
  the existing core scope, (2) add comprehensive cargo tests for all skill
  subsystem behavior (list, info, --json, error cases, multi-scope), and
  (3) verify all acceptance criteria pass end-to-end. Skills are a pure
  metadata/documentation layer — they do not affect CLI command dispatch.

constraints:
  - Phase 1 scope only — no install, remove, or update commands
  - SKILL.md format preserved unchanged (YAML frontmatter + markdown body)
  - manifest.json sits alongside SKILL.md, never replaces it
  - No hotload or file watchers — skills loaded on-demand only
  - Core skills embedded at Packages/com.linalab.lux/Skills/
  - Project skills scanned at .lux/skills/ (relative to project root)
  - Global skills scanned at ~/.lux/skills/
  - Existing cargo tests (32 tests — 5 unit + 27 integration) must continue to pass unchanged
  - Skills are a pure metadata/documentation layer — CLI command dispatch is unaffected
  - Cross-platform support for Windows, macOS, and Linux
  - No version resolution or comparison logic in Phase 1 — schema definition only
  - No dependency resolution in Phase 1 — dependencies field is empty object only
  - manifest.json parse failure must warn on stderr and skip the skill, exit code 0
  - Missing manifest.json in a skill directory must warn on stderr and skip, exit code 0
  - clap_complete shell completions must cover new skill subcommands
  - Follow existing Rust patterns in main.rs — clap derive, serde, anyhow
  - Only one core skill in Phase 1 — lux-unity
  - OpenCode-only client support for now
  - manifest.json name uses simple name format (lux-unity), not reverse-domain

acceptance_criteria:
  - id: AC1
    description: >
      `lux skill list` outputs a table with columns NAME, VERSION, TYPE,
      DESCRIPTION. The table includes a lux-unity row with version=1.0.0,
      type=core, and a non-empty description. Exit code 0.
    verification: |
      cargo run -- skill list
      # Assert: stdout contains "lux-unity", "1.0.0", "core"
      # Assert: exit code == 0
    status: implemented  # print_skill_list() exists at main.rs:581

  - id: AC2
    description: >
      `lux skill list --json` outputs a parseable JSON array containing a
      lux-unity entry with manifest fields. Exit code 0.
    verification: |
      cargo run -- skill list --json | python3 -c "import sys,json; d=json.load(sys.stdin); assert any(s['manifest']['name']=='lux-unity' for s in d)"
      # Assert: valid JSON array
      # Assert: exit code == 0
    status: implemented  # --json path exists at main.rs:584-587

  - id: AC3
    description: >
      `lux skill info lux-unity` outputs human-readable key:value format
      showing all manifest fields (Name, Display Name, Version, Description,
      Type, Author, Keywords, Lux Version), Location path, a References
      section listing 9 .md files, and a SKILL.md preview (first 10 lines).
      Exit code 0.
    verification: |
      cargo run -- skill info lux-unity
      # Assert: stdout contains "Name:", "Version:", "Description:", "Location:", "References:"
      # Assert: 9 reference file names listed
      # Assert: exit code == 0
    status: implemented  # print_skill_info() exists at main.rs:608

  - id: AC4
